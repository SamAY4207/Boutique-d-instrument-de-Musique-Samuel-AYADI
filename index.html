<html lang="fr">

<body class="bgivory">

            <nav class="w-60 flex space-between align-center">
                <a href="#promesses-sec" class="w-20 broack">Nos promesses</a>
                <a href="#produits-sec" class="w-20 broack">Nos produits</a>
                <a href="#services-sec" class="w-20 broack">Nos services</a>
                <a href="#temoignages-sec" class="w-30 broack">Ce qu'ils en ont pensé</a>
            </nav>
        </div>
    </header>
    <main>

        <!-- Filigrane en bg 1 -->
        <img src="assets/instrument-isolee.png" alt="" class="stick-flow1 w-10">

        <!-- Filigrane en bg 2 -->
        <img src="assets/instrument-isolee.png" alt="" class="w-10 stick-flow2">


        

        <section id="hero-sec" class="bghero pt-64 flex space-between align-center">
